name: Framework gap
description: Report a gap, friction, or M8 deferred deliverable in the sw-dev-team-template framework
title: "[framework-gap] "
labels: ["template-gap"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a framework gap. This template ensures the
        report carries the seven fields required by FR-026 + the
        redaction-confirmation per spec clarification 10. See
        `docs/IP_POLICY.md` for the sensitive-content definition.

        Before submitting:
        - Run `git grep -i <customer-name>` on your downstream repo and
          ensure no real customer/vendor names appear in this report.
        - If you are filing an M8 waiver, also add the `m8-waiver` label
          (see FR-029 / spec clarification 12).

  - type: input
    id: template-version
    attributes:
      label: Template version (from your project's TEMPLATE_VERSION file)
      placeholder: "v1.0.0"
    validations:
      required: true

  - type: input
    id: downstream-context
    attributes:
      label: Downstream repo / project context (redacted as needed)
      description: Which repo and what kind of project (PLC firmware, brewery automation, web app, etc.).
    validations:
      required: true

  - type: dropdown
    id: affected-layer
    attributes:
      label: Affected layer
      description: Which part of the framework is affected (matches the E-8 enum from data-model.md).
      options:
        - agent-contract
        - docs
        - scripts
        - workflows
        - migrations
        - meta
        - m8-deliverable
    validations:
      required: true

  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: What happened.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened.
    validations:
      required: true

  - type: checkboxes
    id: redaction-confirm
    attributes:
      label: Sensitive-content redaction (FR-026 + spec clarification 10)
      description: |
        Confirm you have removed or generalized any of the following sensitive content:
      options:
        - label: I confirm I have removed or generalized (i) customer or vendor identities and brand names; (ii) downstream project names; (iii) any CUSTOMER_NOTES.md content (verbatim or paraphrased); (iv) credentials, secrets, tokens, hostnames, IPs. Downstream repos may extend this set in their local docs/IP_POLICY.md.
          required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Proposed acceptance criteria
      description: How the fix would be verified.
    validations:
      required: false
