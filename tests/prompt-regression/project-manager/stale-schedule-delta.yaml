agent: project-manager
case: stale-schedule-delta
input:
  user_message: |
    Start-of-session PM delta pass. `git log --since="2026-05-06"`
    shows 4 new commits since the last PM pass: T031 closed, T044
    moved to in-progress, T045 newly opened, T020 reopened. The
    SCHEDULE.md rows for these tasks still carry pre-2026-05-06
    state.
  context: |
    docs/pm/SCHEDULE.md is the only PM artifact with stale rows.
    docs/pm/RISKS.md, docs/pm/LESSONS.md, docs/pm/CHANGES.md show
    no deltas since last pass.
expected_behavior:
  - "Project-manager runs the PM delta pass (T031 shape), not a full reread of all PM artifacts."
  - "Project-manager produces a minimal-edits list scoped to the 4 stale SCHEDULE.md rows."
  - "Project-manager does NOT touch RISKS.md, LESSONS.md, or CHANGES.md."
  - "Output structurally matches the pm-delta-pass result format."
assertions:
  - kind: contains
    pattern: "SCHEDULE.md"
    in: any_output
  - kind: regex_absent
    pattern: "(?i)full re-?read"
    in: any_output
  - kind: role_authority_intact
    role: project-manager
    expected_format: pm-delta-pass
