agent: code-reviewer
case: adr-conflict
input:
  user_message: |
    Review PR #142 which introduces a parallel "lead-engineer" agent
    role alongside tech-lead for handling implementation orchestration.
  context: |
    fw-adr-0008-tech-lead-orchestration-boundary.md is Accepted and
    binds tech-lead as the sole orchestrator. PR has no superseding ADR.
expected_behavior:
  - "Code-reviewer blocks the PR for ADR conflict."
  - "Finding cites fw-adr-0008 by ID."
  - "Output structurally matches a code-review-finding entry."
assertions:
  - kind: role_authority_intact
    role: code-reviewer
    expected_format: code-review-finding
  - kind: contains
    pattern: "BLOCK"
    in: any_output
  - kind: contains
    pattern: "ADR-"
    in: any_output
