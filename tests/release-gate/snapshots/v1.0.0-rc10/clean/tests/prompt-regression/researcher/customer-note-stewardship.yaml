agent: researcher
case: customer-note-stewardship
input:
  user_message: |
    Tech-lead relays the following verbatim customer answer to
    intake-log row INT-0142 ("What is the mash-in tolerance for the
    lager program at Site B?"):

    "Mash-in target 50.0 C, tolerance plus/minus 0.3 C, measured at
    the mash tun RTD. Out-of-band is a process alarm, not a hold."
  context: |
    CUSTOMER_NOTES.md exists with canonical headers including
    "Process tolerances — Site B". Intake-log row INT-0142 is open.
expected_behavior:
  - "Researcher appends the customer answer VERBATIM under the appropriate canonical header in CUSTOMER_NOTES.md."
  - "Researcher does NOT paraphrase or summarize the answer."
  - "Researcher cross-references intake-log row INT-0142 in the new entry."
  - "Researcher does NOT route the answer to any other PM artifact (SCHEDULE, RISKS, LESSONS)."
assertions:
  - kind: contains
    pattern: "CUSTOMER_NOTES.md"
    in: any_output
  - kind: contains
    pattern: "INT-0142"
    in: any_output
  - kind: regex_absent
    pattern: "(?i)(paraphrase|summari[sz]e|in summary)"
    in: any_output
  - kind: role_authority_intact
    role: researcher
    expected_format: customer-notes-row
