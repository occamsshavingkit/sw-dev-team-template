# Example GitHub Actions CI for downstream projects (per issue #70).
#
# This file is a **reference**, not a shipped active workflow. The
# template intentionally does not place a `.github/workflows/ci.yml`
# into scaffolded projects (project picks its own CI vendor + shape).
# Copy this file to your project's `.github/workflows/ci.yml` and
# adapt to taste; the load-bearing pieces are the `paths-ignore`
# blocks on the heavy jobs.
#
# Why paths-ignore matters: doc-only pushes (CHANGES.md row updates,
# OPEN_QUESTIONS row edits, audit findings, retrospective LESSONS
# updates, ADR amendments) shouldn't burn full Rust/test/miri/cross-
# compile minutes. On private repos billing CI minutes, this multiplies
# the cost of any audit / planning / docs-PR pattern by ~8–14x. The
# `paths-ignore` form is more reliable than commit-message conventions
# because it operates on actual file changes.
#
# Rule of thumb: heavy jobs (multi-minute toolchain runs) get
# paths-ignore. Light jobs (fmt, clippy, deny, audit, sbom — sub-30s
# each) can stay unfiltered if the cost is trivial.

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # --- Light jobs: always run (cheap; no paths-ignore needed) -----------
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # --- Heavy jobs: paths-ignore on doc-only changes ---------------------
  test:
    runs-on: ubuntu-latest
    if: |
      !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - uses: actions/checkout@v4
      # Skip the heavy run when the diff is doc-only.
      - name: detect doc-only push
        id: diff
        run: |
          base="${{ github.event.pull_request.base.sha || github.event.before }}"
          head="${{ github.sha }}"
          if [[ -z "$base" || "$base" == 0000000000000000000000000000000000000000 ]]; then
            echo "doc_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed="$(git diff --name-only "$base" "$head")"
          # If every changed path matches a doc pattern, skip.
          non_doc="$(echo "$changed" | grep -vE '\.(md|txt|adoc)$|^docs/|^CHANGELOG\.md$|^CHANGES\.md$|^README\.md$|^LICENSE$' || true)"
          if [[ -z "$non_doc" ]]; then
            echo "doc_only=true" >> "$GITHUB_OUTPUT"
          else
            echo "doc_only=false" >> "$GITHUB_OUTPUT"
          fi
      - name: test
        if: steps.diff.outputs.doc_only != 'true'
        run: cargo test --all-features

  # --- Alternative paths-ignore form (simpler, no diff inspection) ------
  # Use this form on jobs where you're OK with skipping even mixed
  # code+doc PRs as long as no non-doc file changed:
  #
  # miri:
  #   runs-on: ubuntu-latest
  #   paths-ignore:
  #     - 'docs/**'
  #     - '**.md'
  #     - 'CHANGELOG.md'
  #     - 'README.md'
  #   steps:
  #     - uses: actions/checkout@v4
  #     - name: miri
  #       run: cargo +nightly miri test
  #
  # The workflow-level on.push.paths-ignore form does NOT work the way
  # most people expect — it filters the entire workflow, not individual
  # jobs. Use the diff-detection step above for per-job skipping.
