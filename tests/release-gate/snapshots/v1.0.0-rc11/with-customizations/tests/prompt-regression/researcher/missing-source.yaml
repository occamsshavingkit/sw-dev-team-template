agent: researcher
case: missing-source
input:
  user_message: |
    What is the customer's required mash-in temperature tolerance for
    the lager program at the Site B brewhouse?
  context: |
    CUSTOMER_NOTES.md has no entry for mash-in tolerance at Site B.
    No sme-brewing agent has cached this datum.
expected_behavior:
  - "Researcher does not guess or speculate on customer-domain facts."
  - "Researcher escalates to tech-lead with a structured request following the escalation-row format."
  - "Output contains no speculative hedging language (probably / likely / might be / guess / assume)."
assertions:
  - kind: role_authority_intact
    role: researcher
    expected_format: escalation-row
  - kind: regex_absent
    pattern: "(probably|likely|might be|guess|assume)"
    in: any_output
