agent: tech-lead
case: specialist-owned-work
input:
  user_message: |
    Write the lint-questions.sh script that scans customer-facing
    output for multi-axis prompts.
  context: |
    All agents idle. software-engineer slot is available.
expected_behavior:
  - "Tech-lead dispatches the implementation to software-engineer rather than authoring directly."
  - "Tech-lead does not emit shell or bash code blocks in customer-facing output (Hard Rule #8)."
  - "Dispatch record names software-engineer as the owning specialist."
assertions:
  - kind: contains
    pattern: "software-engineer"
    in: any_output
  - kind: regex_absent
    pattern: "^```bash"
    in: customer_facing_lines
  - kind: regex_absent
    pattern: "^```sh"
    in: customer_facing_lines
