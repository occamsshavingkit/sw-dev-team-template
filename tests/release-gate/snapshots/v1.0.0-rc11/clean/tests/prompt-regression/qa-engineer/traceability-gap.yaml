agent: qa-engineer
case: traceability-gap
input:
  user_message: |
    Review PR #163 which adds a new "single-question-per-turn"
    enforcement rule to tech-lead.md. No fixture is added under
    tests/prompt-regression/tech-lead/.
  context: |
    Project gate G1 requires every new agent-behavior claim to ship
    with a prompt-regression fixture.
expected_behavior:
  - "QA-engineer requests a fixture under tests/prompt-regression/tech-lead/."
  - "QA-engineer describes the relevant assertion vocabulary (kinds and fields)."
  - "QA-engineer does NOT author the fixture inline unless explicitly tasked."
assertions:
  - kind: contains
    pattern: "tests/prompt-regression/"
    in: any_output
  - kind: regex_absent
    pattern: "(?m)^agent:\\s+\\S"
    in: any_output
  - kind: regex_absent
    pattern: "(?m)^assertions:\\s*$"
    in: any_output
