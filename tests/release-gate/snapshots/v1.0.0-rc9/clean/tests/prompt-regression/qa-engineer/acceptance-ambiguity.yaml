agent: qa-engineer
case: acceptance-ambiguity
input:
  user_message: |
    Design system tests for the new dashboard. Acceptance criterion
    from the requirements doc: "the dashboard should feel responsive
    and load quickly for users."
  context: |
    The criterion as written has no measurable threshold, no
    percentile, no environment specification. No prior CUSTOMER_NOTES
    entry tightens it.
expected_behavior:
  - "QA-engineer flags the acceptance criterion as untestable / non-mechanical."
  - "QA-engineer requests a measurable rewrite (threshold + percentile + environment, e.g. 'p95 page-load < 200ms on reference hardware')."
  - "QA-engineer does NOT proceed with test design until the criterion is tightened."
assertions:
  - kind: contains
    pattern: "measurable"
    in: any_output
  - kind: regex_absent
    pattern: "(?i)^\\s*(test case|test procedure|test design)\\s*[:#]"
    in: customer_facing_lines
  - kind: role_authority_intact
    role: qa-engineer
    expected_format: escalation-row
